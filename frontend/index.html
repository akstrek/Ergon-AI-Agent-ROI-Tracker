<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ergon</title>
    <script>
      // Sandbox bypass: React 19 tries to patch window.fetch.
      // If the sandbox exposes fetch with only a getter, provide a dummy setter to avoid the TypeError.
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { 
              // React 19 attempts to monkey-patch fetch for Server Components / Suspense.
              // We quietly swallow the set operation in the sandbox.
            },
            configurable: true
          });
        }
      } catch (e) {
        console.warn("Could not polyfill fetch setter:", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
